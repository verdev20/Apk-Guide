name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund || npm ci --no-audit --no-fund

      - name: Sync Capacitor Android project
        run: npx --no-install cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Compute app version
        id: ver
        run: |
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "name=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        working-directory: android
        env:
          APP_VERSION_CODE: ${{ steps.ver.outputs.code }}
          APP_VERSION_NAME: ${{ steps.ver.outputs.name }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "dist/bantayan-island-travel-guide-v${{ steps.ver.outputs.name }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bantayan-apk
          path: dist/*.apk
          retention-days: 90

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.name }}
          name: Bantayan Island Travel Guide v${{ steps.ver.outputs.name }}
          body: |
            Automatic build from commit ${{ github.sha }}.

            Developed by Vernie Esgana — BSIT 3 North.
          files: dist/*.apk
